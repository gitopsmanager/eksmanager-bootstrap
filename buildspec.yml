version: 0.2

# -----------------------------------------------------------------------------
# EKS Manager Bootstrap — AWS CodeBuild buildspec
# -----------------------------------------------------------------------------
# Sourced from S3 (see iam/codebuild-pipeline-tf/main.tf) — setup-pipeline.sh/
# .ps1 clones the fork with a GitHub App token, zips it, and uploads it here.
# CodeBuild itself never touches GitHub. The server supplies presigned S3
# URLs, SSO ARN and a bearer token via POST /bootstrap/aws.
#
# Entra SAML SSO is set up separately, outside this pipeline — see
# azure-saml/README.md in the repo root.
#
# Environment variables (set on the CodeBuild project):
#   APPROVED_VERSION  ← S3 object version ID approved for apply. Leave empty
#                       on first run — build will print the version ID to
#                       set after you review the plan.
#   EKSMANAGER_CLIENT_ID    ← M2M client ID        (from Settings → Terraform tile)
#   EKSMANAGER_COGNITO_URL  ← Cognito token endpoint
#   EKSMANAGER_API_URL      ← EKS Manager API URL
#
# Management/shared-services account+region and the agent's name/subnet/
# security group/AMI are NOT CodeBuild env vars and are not in topology.json --
# they're pinned once via setup-pipeline.sh (Settings → Terraform tile's
# Generate button), written to pinned.auto.tfvars.json, and committed straight
# into this repo. Terraform loads that file automatically. To change any of
# them, re-run setup-pipeline.sh -- not this buildspec, not a GUI edit.
#
# Secrets Manager (set once):
#   /EKSManagerBootstrap/client-m2m-cognito-secret  ← M2M client secret
# -----------------------------------------------------------------------------

env:
  secrets-manager:
    EKSMANAGER_CLIENT_SECRET: "/EKSManagerBootstrap/client-m2m-cognito-secret"

phases:
  install:
    commands:
      - TERRAFORM_VERSION="1.11.0"
      - |
        wget -q -O terraform.zip \
          "https://releases.hashicorp.com/terraform/${TERRAFORM_VERSION}/terraform_${TERRAFORM_VERSION}_linux_amd64.zip"
      - unzip -q terraform.zip && mv terraform /usr/local/bin/ && rm terraform.zip
      - terraform version

  pre_build:
    commands:
      # Confirm AWS runner identity
      - aws sts get-caller-identity
      - "echo 'OK: AWS identity confirmed'"

      # ── S3 source version (set by CodeBuild for the object it fetched) ────
      - CURRENT_VERSION="${CODEBUILD_SOURCE_VERSION}"
      - echo "Building eksmanager-bootstrap.zip version ${CURRENT_VERSION}"

      # ── Get M2M bearer token and validate topology ────────────────────────
      # Combined into one script so TOKEN is set and used in the same shell
      # process -- CODEBUILD_ENV_FILE isn't populated in every CodeBuild
      # environment, so it can't be relied on to pass it to a separate
      # commands: list item.
      - |
        TOKEN=$(curl -fsSL -X POST "${EKSMANAGER_COGNITO_URL}/oauth2/token" \
          -H "Content-Type: application/x-www-form-urlencoded" \
          -d "grant_type=client_credentials&client_id=${EKSMANAGER_CLIENT_ID}&client_secret=${EKSMANAGER_CLIENT_SECRET}" \
          | grep -o '"access_token":"[^"]*"' | cut -d'"' -f4)

        if [ -z "${TOKEN}" ] || [ "${TOKEN}" = "null" ]; then
          echo "ERROR: Failed to obtain M2M bearer token"
          exit 1
        fi
        echo "OK: M2M bearer token obtained"

        HTTP_STATUS=$(curl -sSL -X POST "${EKSMANAGER_API_URL}/bootstrap/aws" \
          -H "Authorization: Bearer ${TOKEN}" \
          -H "Content-Type: application/json" \
          -d @topology.json \
          -o terraform.tfvars.json \
          -w "%{http_code}")

        if [ "${HTTP_STATUS}" != "200" ]; then
          echo "ERROR: topology.json validation failed (HTTP ${HTTP_STATUS})"
          cat terraform.tfvars.json
          exit 1
        fi
        echo "OK: topology.json validated (HTTP 200) — terraform.tfvars.json received"

      - cp terraform.tfvars.json pinned.auto.tfvars.json aws/
      - |
        SHARED_SERVICES_ACCOUNT_ID=$(python3 -c "import json; print(json.load(open('pinned.auto.tfvars.json'))['shared_services_account_id'])")
        SHARED_SERVICES_REGION=$(python3 -c "import json; print(json.load(open('pinned.auto.tfvars.json'))['shared_services_region'])")
        STATE_BUCKET="eksmanager-bootstrap-${SHARED_SERVICES_ACCOUNT_ID}"

        terraform -chdir=aws init -input=false \
          -backend-config="bucket=${STATE_BUCKET}" \
          -backend-config="region=${SHARED_SERVICES_REGION}"
      - "echo 'OK: terraform init complete'"

      # ── TEMPORARY: one-time import ──────────────────────────────────────
      # Reconciles four resources that already exist in AWS from earlier
      # runs made before this S3 backend existed (local state, discarded
      # between every CodeBuild run, so it never recorded them). Each is
      # guarded with `|| true` since a resource already present in state
      # makes import fail loudly -- safe to re-run this build without
      # breaking on a resource already reconciled by a prior attempt.
      # DELETE THIS WHOLE BLOCK once a build completes with no import
      # errors below -- it's a one-time fixup, not a permanent step.
      - |
        terraform -chdir=aws import \
          module.org.aws_organizations_delegated_administrator.stacksets \
          905418220450/member.org.stacksets.cloudformation.amazonaws.com \
          || echo "OK (or already imported): delegated_administrator"

        terraform -chdir=aws import \
          module.shared_services.aws_ecr_repository.app \
          eksmanager \
          || echo "OK (or already imported): ecr_repository"

        terraform -chdir=aws import \
          module.shared_services.aws_s3_bucket.config \
          eks-manager-config-store-905418220450 \
          || echo "OK (or already imported): s3_bucket config"

        terraform -chdir=aws import \
          module.shared_services.aws_iam_role.agent \
          EKSManagerAgentRole \
          || echo "OK (or already imported): iam_role agent"

        terraform -chdir=aws import \
          module.shared_services.aws_iam_instance_profile.agent \
          EKSManagerAgentRole \
          || echo "OK (or already imported): iam_instance_profile agent"

        terraform -chdir=aws import \
          module.shared_services.aws_secretsmanager_secret.app \
          "arn:aws:secretsmanager:eu-west-1:905418220450:secret:/EKSManager/config-Lo7V0p" \
          || echo "OK (or already imported): secretsmanager_secret app"

        terraform -chdir=aws import \
          module.stackset.aws_cloudformation_stack_set.enable_account \
          "EKSManagerEnableAccountStackSet,DELEGATED_ADMIN" \
          || echo "OK (or already imported): cloudformation_stack_set enable_account"
      - "echo 'OK: one-time import block complete -- remove it from buildspec.yml now'"

  build:
    commands:
      # ── Plan ─────────────────────────────────────────────────────────────
      - terraform -chdir=aws plan -input=false -out=tfplan
      - "echo 'OK: terraform plan complete'"

      # ── Verify approved version before applying ───────────────────────────
      - |
        if [ "${APPROVED_VERSION}" != "${CURRENT_VERSION}" ]; then
          echo "================================================================"
          echo "APPROVAL REQUIRED — review the plan output above, then:"
          echo "  1. Update APPROVED_VERSION on this CodeBuild project to:"
          echo "       ${CURRENT_VERSION}"
          echo "  2. Re-run the build to apply"
          echo "================================================================"
          exit 1
        fi
        echo "OK: Version approved — applying."

      # ── Apply ─────────────────────────────────────────────────────────────
      - terraform -chdir=aws apply -input=false tfplan
      - "echo 'OK: terraform apply complete'"

  post_build:
    commands:
      - echo "Bootstrap complete."
